Q("Angirasa and Bhrigu were rivals. Bhrigu's line produced Shukracharya, guru of the Asuras. What did Angirasa's line produce?","Vashishtha, rajpurohit of the Suryavanshis","Kashyapa, father of the Devas and Asuras","Brihaspati, guru of the Devas","Vishvamitra, drashta of the Gayatri Mantra",2),
Q("When Kanva took samadhi, what happened, and what was ultimately created from it?","A river formed around him and Vishwakarma used its water to forge divine weapons","An anthill grew over him and a divine bamboo grew from the Earth above; Brahma gave the bamboo to Vishwakarma, who used it to create two divine dhanushas","A divine tree grew from his body and its branches became the bows of the Devas","A golden lotus bloomed above him, from which Vishwakarma forged the Sudarshana Chakra",1),
]},
{n:"Kacha and Shukracharya",qs:[
Q("Why did the Devas send Kacha to Shukracharya?","To assassinate Shukracharya in his sleep","To spy on the Asuras' military plans","To learn the Mrita Sanjivani Mantra — a chant to revive the dead","To negotiate a peace treaty with the Asuras",2),
Q("Why did Shukracharya keep reviving Kacha after the Asuras killed him?","Because Brahma ordered him to protect all students","Because his daughter Devayani loved Kacha","Because the Mrita Sanjivani Mantra required a living subject","Because Kacha was secretly his son from a previous life",1),
Q("How did the Asuras finally ensure Kacha could not be revived easily?","They burned his body, scattered the ashes across the ocean","They killed Kacha, burnt his body, and mixed the ashes into Shukracharya's wine","They sealed Kacha's body in an unbreakable divine cage","They fed his body to a divine serpent",1),
Q("Why did Kacha refuse to marry Devayani?","He had taken a vow of celibacy as a Brahmachari","He argued they were now siblings since both came from her father","He was already betrothed to an Apsara in Swarga","He feared Shukracharya would curse him",1),
]},
{n:"Bharadvaja, Dronacharya, and Ashwatthama",qs:[
Q("Dronacharya married whom, and who was their son?","Kripi, sister of Kripacharya; their son was Ashwatthama","Devayani, daughter of Shukracharya; their son was Ashwatthama","Kripi, daughter of Bharadvaja; their son was Dhrishtadyumna","Tara, wife of Brihaspati; their son was Kacha",0),
Q("Which three individuals did Bharadvaja teach?","Dronacharya, Kripacharya, and Bhishma","Dronacharya, Drupada, and Bhishma","Dronacharya, Parashurama, and Arjuna","Dronacharya, Drupada, and Arjuna",1),
]},
{n:"Rishi lineage — Bhrigu",qs:[
Q("Through which line was Parashurama a descendant of Bhrigu?","Through Shukracharya","Through Jamadagni — a different line from Shukracharya","Through Brihaspati","Through Bharadvaja",1),
Q("Bhrigu fathered which guru?","Brihaspati, guru of the Devas","Dronacharya, guru of the Pandavas","Vashishtha, rajpurohit of the Suryavanshis","Shukracharya, guru of the Asuras",3),
]},
{n:"The Pinaka Dhanusha",qs:[
Q("Who gave the Pinaka Dhanusha to Janak of Mithila?","Vishwakarma","Shiva","Parashurama","Brahma",2),
Q("The Pinaka Dhanusha was created by Vishwakarma for Shiva to defeat whom?","Hiranyakashipu in his celestial fortress","The three Tarakasuras of Tripura — three floating celestial cities of iron, gold, and silver","Ravana in Lanka","Andhaka, the blind Asura",1),
Q("In the arrow used to destroy Tripura, what role did each entity play?","Vishnu as the arrow, Vayu as the tail, Agni as the tip, and Vasuki as the string","Agni as the arrow, Vishnu as the tail, Vayu as the tip, and Shesha as the string","Shiva as the arrow, Brahma as the tail, Vishnu as the tip, and Vasuki as the string","Vishnu as the arrow, Indra as the tail, Surya as the tip, and Vasuki as the string",0),
]},
{n:"Sita and the Pinaka Dhanusha",qs:[
Q("How was Sita found?","She was born from a lotus in the Ksheer Sagar","She was found by Janak and his wife Sunaina in a field","She descended from the heavens in a golden chariot","She was born from the flames of a sacred yagna",1),
Q("Why was Sita not born from a womb?","Because Lakshmi chose to manifest directly","Because Ravana controlled the grahas — celestial bodies governing fate — so the Devas ensured she was not born from a womb but rose from the soil","Because Brahma decreed that all avataras of Lakshmi must emerge from the Earth","Because Janak performed a yagna that brought her from the underworld",1),
Q("What did Sita know about the golden deer, and why did she send Rama after it?","She believed it was a divine gift from Indra and wanted it as a pet","She knew no golden deer existed, yet sent Rama after it — setting in motion the war with Ravana","She thought it was a test from Shiva and wanted Rama to prove his skill","She did not know it was false and was genuinely enchanted",1),
Q("Who was Urmila, and whom did she marry?","Urmila was Sita's cousin; she married Bharata","Urmila was Janak and Sunaina's daughter; she married Lakshmana","Urmila was Sita's sister found in the same field; she married Shatrughna","Urmila was Sunaina's niece; she married Lakshmana",1),
]},
{n:"Other divine dhanushas",qs:[
Q("Parashurama gave the Vijaya Dhanusha to whom?","Arjuna, son of Indra","Bhishma, son of Shantanu","Karna, son of Surya","Drona, son of Bharadvaja",2),
Q("The Gandiva was originally whose dhanusha, and who received it?","Shiva's dhanusha, given to Rama","Vishnu's dhanusha, given to Bhishma","Brahma's dhanusha, given to Arjuna, son of Indra, by Indra","Indra's dhanusha, given to Arjuna directly",2),
]},
{n:"Rishi lineage — Atri",qs:[
Q("Atri, founder of the Atreya Gotra, fathered which two notable figures?","Agastya and Bharadvaja","Chandra and Durvasa — a manifestation of Shiva","Kashyapa and Marichi","Brihaspati and Vishvamitra",1),
Q("What did Chandra found?","The Suryavanshi Dynasty","The Kaurava Dynasty","The Chandravanshi Dynasty","The Yadava Dynasty",2),
]},
{n:"Rishi lineage — Pulastya (the lineage of Ravana)",qs:[
Q("Vishrava had two lines through two wives. Through Ilavida, daughter of Bharadvaja, who was his son?","Ravana","Kumbhakarna","Kubera, the original ruler of Lanka","Vibhishana",2),
Q("Why did Vishrava warn that his children through Kaikesi would have fierce temperaments?","Because Kaikesi was an Asura princess under a curse","Because Kaikesi approached him at twilight — an unholy hour","Because Kaikesi had performed dark tapasya before marriage","Because the stars were in a malevolent alignment at the time",1),
Q("Why was Vibhishana born pious, unlike his brothers Ravana and Kumbhakarna?","Because Vishrava performed a special yagna before his birth","Because Kaikesi repented during her final pregnancy","Because Brahma blessed the child while still in the womb","Because Vibhishana was secretly fathered by a rishi",1),
Q("What did Ravana take from his half-brother Kubera after overthrowing him?","Kubera's crown and his divine treasury","Lanka and the Pushpaka Vimana — a flying chariot","The Ksheer Sagar and the divine conch","Lanka and Kubera's golden mace",1),
Q("Surpanakha was the daughter of Vishrava and Kaikesi. She was the sister of which of the following?","Kubera and Vibhishana","Ravana, Kumbhakarna, and Vibhishana","Ravana and Kubera","Ravana, Kumbhakarna, and Kubera",1),
]},
{n:"Indrajit and the birth of Rama's mission",qs:[
Q("Indrajit was the son of Ravana and whom?","Surpanakha","Kaikesi","Mandodari, daughter of Mayasura the Asura architect","Tara, queen of the Vanaras",2),
Q("Indrajit possessed divya astras and had once defeated whom?","Brahma","Shiva","Vishnu","Indra",3),
Q("Why did the Devas ensure Sita emerged from the ground rather than being born from a womb?","Because a child of the soil would be immune to Ravana's weapons","Because Ravana controlled the grahas, so they ensured she was not born under his influence","Because only an Earth-born being could enter Lanka","Because Vishnu decreed that Lakshmi must always emerge from the Earth",1),
]},
{n:"Rishi lineages — Pulaha, Kratu, Marichi, and Vashishtha",qs:[
Q("Pulaha fathered Kardama, who fathered whom?","Agastya","Vishvamitra","Kapila","Kanva",2),
Q("Marichi fathered Kashyapa. Through which wife did Kashyapa father the Devas?","Diti","Kadru","Vinata","Aditi",3),
Q("Through which wife did Kashyapa father the Asuras?","Aditi","Diti","Vinata","Kadru",1),
]},
{n:"The Suryavanshi Dynasty",qs:[
Q("Who founded the Suryavanshi Dynasty?","Vaivasvata Manu","Ikshvaku, son of Vaivasvata Manu","Vivasvan, the presiding deity of the Sun","Harishchandra, the truthful king",1),
Q("Which of the following is the correct order of notable Suryavanshi rulers mentioned in the text?","Harishchandra, Bhagiratha, Raghu, Dasharatha, Rama","Raghu, Harishchandra, Bhagiratha, Dasharatha, Rama","Bhagiratha, Raghu, Harishchandra, Dasharatha, Rama","Ikshvaku, Raghu, Bhagiratha, Harishchandra, Dasharatha",0),
]},
{n:"Sagara, Kapila, and the 60,000 sons",qs:[
Q("What yagna did Sagara perform, and who stole the sacrificial horse?","The Rajasuya Yagna; Shukracharya stole the horse","The Ashvamedha Yagna; Indra stole the sacrificial horse","The Putrakameshti Yagna; Ravana stole the horse","The Ashvamedha Yagna; Narada stole the sacrificial horse",1),
Q("What happened when Sagara's 60,000 sons found the horse near Kapila's ashram?","Kapila welcomed them and returned the horse peacefully","They praised Kapila and asked for his blessing","Thinking Kapila was the thief, they insulted him; Kapila opened his eyes and his tejas turned all 60,000 into ash","They attacked Kapila, who used a divya astra to scatter them",2),
Q("What did Sagara's 60,000 sons create while digging the Earth searching for the horse?","Mountains","Rivers","The oceans — sagara","Caves leading to Patala",2),
Q("How many generations did it take to liberate the 60,000 souls?","Three generations — Sagara, Anshuman, and Bhagiratha","Four generations — Sagara, Anshuman, Dilipa, and Bhagiratha","Five generations — Sagara, Anshuman, Dilipa, Raghu, and Bhagiratha","Two generations — Sagara and Bhagiratha",1),
]},
{n:"Bhagiratha and the descent of Ganga",qs:[
Q("Only Ganga's waters could grant the 60,000 souls moksha. Where was Ganga flowing at the time?","In the cosmic ocean beneath the Earth","Only in the heavens","Through Patala, the netherworld","In Brahmaloka, Brahma's abode",1),
Q("Who agreed to release Ganga, and what warning was given?","Vishnu agreed; he warned the Asuras would try to stop her","Brahma agreed but warned the Earth would shatter from the force","Shiva agreed but warned the heavens would collapse","Indra agreed but warned the Devas would lose their power",1),
Q("How did Shiva control Ganga's descent?","He placed a mountain in her path to slow her flow","Shiva trapped her waters in his jata — his matted locks — and released them in controlled streams","He froze her waters mid-air and melted them gradually","He used the Pinaka Dhanusha to split the flow into tributaries",1),
Q("Ganga's flow destroyed the sacrificial altar of Jahnu. What did Jahnu do?","He cursed Ganga to flow underground forever","He built a dam to redirect her course","Jahnu drank the entire river; Bhagiratha pleaded for mercy; Jahnu released Ganga from his ear","He used his tapasya to split Ganga into seven streams",2),
Q("Where did Bhagiratha lead Ganga to purify the 60,000 souls?","To Varanasi, where the souls awaited liberation","To Prayagraj, at the confluence of three rivers","Across the Indian plains to Ganga Sagar","To the foothills of the Himalayas",2),
Q("What name did Ganga receive after being released from Jahnu's ear, and why?","Bhagirathi — named after Bhagiratha who led her to Earth","Jahnavi — because Jahnu released Ganga from his ear, giving her a second birth","Mandakini — named after the celestial stream she originated from","Alakananda — named after Jahnu's ashram",1),
]},
{n:"Harishchandra",qs:[
Q("Harishchandra promised his firstborn to which deity in exchange for a son?","Indra","Agni","Varuna","Yama",2),
Q("Ajigarta sold his middle son Shunahshepa as a substitute sacrifice for how many cows?","A thousand cows","Ten cows","Fifty cows","A hundred cows",3),
Q("Who taught Shunahshepa two secret hymns that spared his life, and to which deities were they addressed?","Vashishtha taught him hymns to Indra and Surya","Vishvamitra taught him hymns to Varuna and Agni","Narada taught him hymns to Vishnu and Brahma","Agastya taught him hymns to Shiva and Parvati",1),
]},
{n:"Trishanku and the Southern Swarga",qs:[
Q("Why was Trishanku cursed to become a chandala?","He insulted the Saptarishis during a yagna","He attempted to enter Swarga without permission and the Devas cast him out","When Trishanku persisted in his desire to enter Swarga in his physical body after Vashishtha refused, Vashishtha's sons cursed him","He stole sacred objects from Vashishtha's ashram",2),
Q("What did Vishvamitra do after Indra pushed Trishanku back down?","He destroyed Indra's throne in Swarga","Vishvamitra shouted 'stay!', stopping Trishanku mid-air through sheer willpower, and began creating an entirely new set of stars and a Southern Swarga","He cursed Indra to fall from Swarga","He launched Trishanku back toward Swarga using the Brahmastra",1),
Q("Which constellation represents Trishanku suspended in his middle Swarga?","Orion","The constellation Crux, also known as the Southern Cross","Ursa Major","Cassiopeia",1),
Q("How does Trishanku remain in his Southern Swarga?","He stands upright on a celestial platform","He floats freely among the new stars","He remains suspended upside-down","He sits on a throne between two constellations",2),
]},
{n:"Dasharatha and Rama",qs:[
Q("Who were Dasharatha's three wives and their respective sons?","Kausalya — mother of Rama; Kaikeyi — mother of Bharata; Sumitra — mother of Lakshmana and Shatrughna","Kausalya — mother of Rama and Lakshmana; Kaikeyi — mother of Bharata; Sumitra — mother of Shatrughna","Kausalya — mother of Rama; Sumitra — mother of Bharata; Kaikeyi — mother of Lakshmana and Shatrughna","Kaikeyi — mother of Rama; Kausalya — mother of Bharata; Sumitra — mother of Lakshmana and Shatrughna",0),
Q("Bharata's son Taksha founded which city?","Hastinapura","Indraprastha","Takshashila","Dwaraka",2),
Q("How did Kaikeyi save Dasharatha's life in battle?","She shielded him with a divine weapon","She fired arrows at the Asura Sambasura from behind","She served as his charioteer and inserted her finger into a broken wheel hub","She summoned the Devas to intervene",2),
Q("Why did Rama kill Bali of the Vanaras from concealment?","Because Bali was immune to all weapons except those fired from hiding","Because Brahma's boon allowed Bali to absorb half of any opponent's strength","Because Bali could only be defeated during sleep","Because Sugriva demanded it as a condition of the alliance",1),
Q("What was the karmic consequence of Rama killing Bali of the Vanaras by stealth?","Rama had to spend an extra year in exile","Bali was reborn as the hunter Jara, who struck Krishna's foot, balancing the karmic debt","Rama was cursed by Bali's wife to lose Sita","Bali was reborn as Duryodhana to oppose dharma in a future age",1),
Q("How many years was Rama exiled to the Dandaka Forest?","Twelve years","Thirteen years","Fourteen years","Seven years",2),
]},
{n:"The Chandravanshi Dynasty",qs:[
Q("Chandra eloped with Tara, who was whose wife?","Vashishtha's","Shukracharya's","Brihaspati's","Angirasa's",2),
Q("Who intervened to return Tara to Brihaspati, and what was the consequence?","Brahma and Vishnu intervened; Tara returned but was already pregnant with Budha","Indra and Shiva intervened; Tara was already pregnant; their son was Budha","Narada and Agastya intervened; Tara returned and bore no children","The Saptarishis intervened; Tara was cursed to never bear children again",1),
Q("Budha married Ila, daughter of Vaivasvata Manu. Their son was Pururavas. Who did Pururavas father?","Nahusha","Yayati","Ayus","Budha",2),
Q("Kshatravriddha, son of Ayus, established the royal line of which city?","Hastinapura","Mathura","Kashi","Prayagraj",2),
]},
{n:"Nahusha — the temporary Indra",qs:[
Q("Who was Ashokasundari, and how did she come into being?","She was the daughter of Brahma, born from a lotus","She was the daughter of Shiva and Durga, and sister of Ganesha and Kartikeya; she came from Kalpavriksha","She was the daughter of Indra, born from the waters of Swarga","She was the daughter of Vishnu and Lakshmi, born during the Samudra Manthan",1),
Q("Why did Indra take temporary leave from his throne?","He was banished by Brahma for arrogance","He was defeated by Nahusha in single combat","He took leave to atone for killing Vritrasura","He went on a pilgrimage to gain more spiritual power",2),
Q("What weapon was forged from Dadhichi's bones, and who fashioned it?","The Trishula, fashioned by Shiva","The Vajra — Indra's thunderbolt weapon — fashioned by Vishwakarma","The Sudarshana Chakra, fashioned by Brahma","The Pashupatastra, fashioned by Vishwakarma",1),
Q("What condition did Indrani set for Nahusha when he demanded she marry him?","He must defeat Indra in battle first","He must arrive in a palki — a palanquin — carried by the Saptarishis","He must perform a thousand years of tapasya","He must obtain Brahma's blessing",1),
Q("How was Nahusha cursed, and what triggered it?","He insulted Brihaspati, who cursed him to become a tree","He kicked Agastya for being too slow and shouted 'sarpa, sarpa'; Agastya cursed Nahusha to live as a snake","He struck Vashishtha, who cursed him to fall from Swarga","He mocked Indra's wife, and the Saptarishis jointly cursed him",1),
]},
{n:"Yayati — the split into Yadava and Paurava lines",qs:[
Q("Yayati had two wives. Who was Devayani's father, and who was Sharmishtha's father?","Devayani was the daughter of Brihaspati; Sharmishtha was the daughter of Vrishaparva","Devayani was the daughter of Shukracharya; Sharmishtha was the daughter of Vrishaparva, an Asura who was Shukracharya's disciple","Devayani was the daughter of Vashishtha; Sharmishtha was the daughter of Daksha","Devayani was the daughter of Shukracharya; Sharmishtha was the daughter of Bali",1),
Q("Yadu, founder of the Yadava Dynasty, was the son of Yayati and whom?","Sharmishtha","Devayani","Sanjana","Ashokasundari",1),
Q("Puru, founder of the Paurava Dynasty, was the son of Yayati and whom?","Devayani","Sharmishtha","Ashokasundari","Gandhari",1),
Q("Druhyu, who established the royal line of Gandhara, was the son of Yayati and whom?","Devayani","Sanjana","Sharmishtha","Tara",2),
Q("Why was Yadu barred from ever being crowned, and what consequence did this have for Krishna?","Yadu was cursed by Brahma; Krishna was therefore born as a Shudra","Yadu refused to transfer his youth to Yayati; which is why Krishna, a descendant of Yadu, was never a raja","Yadu lost a divine contest to Puru; Krishna was therefore never acknowledged by the Suryavanshis","Yadu insulted Shukracharya; Krishna was cursed to never rule a kingdom",1),
Q("Yayati gave Puru the title of samrat and the kingdom of Pratishthana. Where is Pratishthana?","Present-day Mathura","Present-day Varanasi","Present-day Prayagraj","Present-day Ujjain",2),
]},
{n:"Vishvamitra and Vashishtha — the great rivalry",qs:[
Q("When Kaushika visited Vashishtha's ashram, how did Vashishtha feed his entire army?","Using a divine yagna that produced unlimited food","Using the cow Nandini, daughter of Kamadhenu","Using a boon from Annapurna, goddess of food","Using the Kalpavriksha",1),
Q("After Kaushika tried to take Nandini by force, what happened to every divya astra he fired?","They bounced back and destroyed his own army","Vashishtha's spiritual power swallowed every divya astra Kaushika fired","They turned into flowers upon touching Vashishtha","They were absorbed by Nandini and returned as milk",1),
Q("Who did Indra send to seduce Vishvamitra the first time, and what was the result?","Rambha; Vishvamitra cursed her to stone","Urvashi; Vishvamitra fell in love and lost his tapasya","Menaka; he fell in love, broke his celibacy, and lived with her for ten years","Tilottama; Vishvamitra rejected her but lost concentration",2),
Q("Who was Shakuntala's biological parents, and who adopted her?","Vishvamitra and Urvashi; adopted by Vashishtha","Vishvamitra and Menaka; Kanva adopted Shakuntala","Indra and Menaka; adopted by Bharadvaja","Kaushika and Rambha; adopted by Kanva",1),
Q("When Indra sent Rambha, what did Vishvamitra do, and what did he lose?","He ignored her and gained the title Brahmarishi","He cursed her to stone — losing his merit again, this time to anger","He fell in love and lost ten more years","He sent her back to Indra with a warning",1),
Q("What practices did Vishvamitra undertake for a thousand years to master his senses?","Recitation of the Gayatri Mantra and water fasting","Mauna — a vow of complete silence — and extreme fasting","Standing on one foot while chanting hymns to Agni","Living underwater in the Ganga while performing pranayama",1),
]},
{n:"Kalmashapada",qs:[
Q("Why did Shakti, Vashishtha's eldest son, curse Kalmashapada?","Kalmashapada insulted the Saptarishis at a yagna","They met on a narrow forest path, neither would give way, and Kalmashapada struck Shakti with his whip","Kalmashapada stole Nandini from Vashishtha's ashram","Kalmashapada refused to pay guru dakshina to Vashishtha",1),
Q("Who ensured that Shakti's curse on Kalmashapada took effect immediately?","Narada","Agastya","Vishvamitra","Brihaspati",2),
Q("What did Kalmashapada do to Vashishtha's family after becoming a Rakshasa?","He imprisoned Vashishtha in a dungeon for twelve years","He devoured Shakti and all one hundred of Vashishtha's sons","He destroyed Vashishtha's ashram and stole Nandini","He cursed all of Vashishtha's descendants to be born as mortals",1),
Q("What title was Vishvamitra conferred by Vashishtha, and what triggered this?","Rajarishi; after defeating Vashishtha in debate","Brahmarishi; after witnessing Vashishtha's forgiveness and approaching him as a student","Maharishi; after completing a thousand years of tapasya","Devarishi; after Vashishtha saw his devotion to Vishnu",1),
Q("Vishvamitra is credited as the drashta of what, and what else did he do?","The drashta — the seer — of the Gayatri Mantra; he trained Rama and Lakshmana to vanquish Rakshasas","The drashta of the Nasadiya Sukta; he trained Bhishma and Parashurama","The drashta of the Mrita Sanjivani Mantra; he trained the Pandavas","The drashta of the Rudra Mantra; he trained Rama and Bharata",0),
]},
{n:"From Bharata to Kuru — the founding of the Kaurava Dynasty",qs:[
Q("Shakuntala married Dushyanta. Their son Bharata gave his kingdom to whom?","His eldest son, to continue the bloodline","A worthy successor — Bhumanyu, his adopted son — not his own son","His guru, as a form of guru dakshina","The Saptarishis, to govern in his absence",1),
Q("Who married Tapti, daughter of Vivasvan and Chhaya, and who was their son?","Dushyanta married Tapti; their son was Bharata","Bhumanyu married Tapti; their son was Kuru","Samavarna married Tapti; their son was Kuru","Hastin married Tapti; their son was Shantanu",2),
Q("Who founded the Kaurava Dynasty?","Bharata","Puru","Kuru","Shantanu",2),
]},
{n:"Uparichara Vasu, Satyavati, and the bridge to the Mahabharata",qs:[
Q("Uparichara Vasu ruled which kingdom, and who was its original founder?","The Magadha Kingdom, founded by Brihadratha","The Chedi Kingdom, founded by Chidi from the Yadava bloodline","The Panchala Kingdom, founded by Drupada","The Matsya Kingdom, founded by Matsya",1),
Q("How were Satyavati and Matsya born?","From a yagna performed by Uparichara Vasu","From the Apsara Adrika, who was in the form of a fish; born when the fish was cut open by a fisherman","From a lotus that bloomed in the Yamuna River","From the blessings of Parashurama",1),
Q("Who raised Satyavati?","Vishrava, a wandering rishi","Uparichara Vasu himself","The fisherman-chieftain Dasharaja","Parashara, grandson of Vashishtha",2),
Q("Who were the parents of Vyasa?","Vashishtha was the father and Satyavati was the mother","Uparichara Vasu was the father and Adrika was the mother","Parashara was the father and Satyavati was the mother","Bharadvaja was the father and Satyavati was the mother",2),
Q("Brihadratha's son Jarasandha founded which kingdom?","The Chedi Kingdom","The Matsya Kingdom","The Magadha Kingdom","The Anga Kingdom",2),
]},
{n:"The Vasus and the birth of Bhishma",qs:[
Q("Why were the eight Vasus cursed to be born on Earth as mortals?","They insulted Brahma at a celestial assembly","Prabhas and his brothers stole the cow Nandini from Vashishtha","They attempted to enter Vaikuntha without permission","They sided with the Asuras during the Samudra Manthan",1),
Q("What was the pact the Vasus made with Ganga?","She would raise all eight as warriors and send them to battle the Asuras","She would drown seven immediately after birth to liberate them to Swarga while the eighth — Prabhas — would live a full life","She would educate all eight and then send them to Swarga after twelve years","She would protect all eight until they reached adulthood",1),
Q("In a previous incarnation, who was Shantanu, and why was he cursed?","He was Nahusha; cursed for arrogance","He was Mahabhisha; in Brahma's court, a breeze displaced Ganga's clothing and he stared lustfully; Brahma cursed both to be born as mortals","He was Pratipa; cursed for refusing to marry Ganga","He was Vasu; cursed for stealing from Vashishtha",1),
Q("Prabhas was born as Devavrata, son of Shantanu and Ganga. He later became known by what name?","Dronacharya","Bhishma","Kripacharya","Vidura",1),
Q("Why did Prabhas receive a harsher sentence than the other seven Vasus?","He was the most arrogant among them","He had directly insulted Vashishtha","He led the theft of the cow Nandini","He refused to apologize when the other Vasus begged for mercy",2),
]},
{n:"From Shantanu to the Kuru succession",qs:[
Q("What condition did Dasharaja set for accepting Satyavati's marriage to Shantanu?","Satyavati must be crowned queen immediately","Devavrata must vow lifelong celibacy, ensuring Satyavati's lineage would rule Hastinapura","Shantanu must give up his throne to Dasharaja","Shantanu must banish Ganga and her son",1),
Q("Shantanu and Satyavati had two sons. Who were they?","Dhritarashtra and Pandu","Vichitravirya and Chitrangada","Bhishma and Vidura","Vichitravirya and Bhishma",1),
Q("How were Kripacharya and his sister Kripi found?","They were born from a yagna performed by Dronacharya","They were found abandoned by Shantanu","They descended from the heavens during a storm","They were discovered by Bhishma in the forest",1),
]},
{n:"Amba, Ambika, and Ambalika",qs:[
Q("Why did Bhishma arrive at the swayamvara of the three daughters of the raja of Kashi?","He was invited as the chief guest","He came to find a bride for himself","Hastinapura was not invited, so Bhishma arrived alone, placed the three rajkumaris in his chariot, and defeated the pursuing rajas","He was sent by Satyavati to kidnap the princesses",2),
Q("Ambika and Ambalika married Vichitravirya and became the mothers of whom?","Bhishma and Vidura","Pandu and Vidura","Dhritarashtra and Pandu","Dhritarashtra and Bhishma",2),
Q("What happened to Amba after Bhishma released her?","She married another raja and lived happily","Shalva rejected her for having been 'won' by another man; Bhishma refused to marry her due to his vow","She became a priestess in a temple at Kashi","She returned to her father and never married",1),
Q("Amba performed intense tapasya and was reborn as whom?","Draupadi, destined to cause the Kauravas' downfall","Shikhandi, destined to cause Bhishma's downfall","Kunti, destined to bear the Pandavas","Gandhari, destined to curse Krishna",1),
Q("Who challenged Bhishma on Amba's behalf, and what was the outcome?","Dronacharya challenged Bhishma but was defeated","Parashurama challenged Bhishma but was defeated","Shalva challenged Bhishma but was defeated","Krishna challenged Bhishma but the fight was stopped by the Devas",1),
]},
{n:"Vyasa and the next generation",qs:[
Q("Why was Vyasa summoned for niyoga?","To teach the Vedas to the next generation","Because Vichitravirya was dead and there were no heirs; the Kuru lineage faced extinction","To perform a yagna that would produce divine warriors","To bless the kingdom against an Asura invasion",1),
Q("Why was Dhritarashtra born blind?","Because Vyasa cursed Ambika for her disrespect","Because Ambika closed her eyes when Vyasa appeared","Because of a curse from Gandhari in a previous life","Because Shiva punished the Kuru lineage",1),
Q("Vidura was born healthy and wise from whom, and what role did he later assume?","From Satyavati's maid; he became the royal priest","From Ambika's maid; he became Hastinapura's prime minister","From a maid sent by Ambika for the third attempt; he became Hastinapura's prime minister","From Ambalika herself; he became the chief minister",2),
Q("In a previous life, what had Dhritarashtra done that resulted in his being born blind with 100 sons who would all die?","He had blinded a father bird and killed its 100 fledglings","He had killed 100 sages who were meditating","He had destroyed 100 nests of sacred birds","He had stolen the eyes of a rishi and killed his 100 students",0),
]},
{n:"The curse of Pandu",qs:[
Q("While hunting, Pandu shot a deer that was actually whom in disguise?","Narada","Durvasa","Vashishtha","Kindama",3),
Q("What was the dying Kindama's curse on Pandu?","He would lose his kingdom within a year","Approaching his wives with desire would kill him instantly","He would never father children","He would be reborn as an animal in his next life",1),
Q("Through Kunti, which Devas fathered which Pandavas?","Yama fathered Bhima, Vayu fathered Yudhishthira, and Indra fathered Arjuna","Yama fathered Yudhishthira, Vayu fathered Bhima, and Indra fathered Arjuna","Indra fathered Yudhishthira, Vayu fathered Bhima, and Yama fathered Arjuna","Yama fathered Yudhishthira, Indra fathered Bhima, and Vayu fathered Arjuna",1),
Q("Through Madri, who fathered the twins Nakula and Sahadeva?","The Adityas","Surya and Chandra","The Ashwini Kumaras","Vayu and Agni",2),
Q("Before dying, Pandu gave Sahadeva a boon enabling mastery of what?","Warfare — specifically the use of divya astras","Jyotish — astrology; Sahadeva knew how the Mahabharata would end","Ayurveda — the science of healing","Sangeet — the science of music and sound",1),
]},
{n:"Krishna — birth and early life",qs:[
Q("Who was Kansa in relation to Devaki?","Her brother","Actually her cousin, being Ugrasena's brother's daughter; but referred to as his sister","Her uncle","Her stepbrother through Ugrasena's second wife",1),
Q("How was Balarama born?","The seventh child was transferred to the womb of Rohini, Vasudeva's other wife, who gave birth to Balarama","Rohini conceived Balarama naturally with Vasudeva before his imprisonment","Balarama was born from a divine lotus in Gokula","Devaki gave birth to Balarama in prison, and he was smuggled out",0),
Q("The eighth child was swapped with whose daughter in Gokula?","Rohini and Vasudeva's daughter","Nanda and Yashoda's daughter Yogamaya","Dasharaja and his wife's daughter","Ugrasena's granddaughter",1),
Q("Who is worshipped today as Vindhyavasini?","Sita","Yogamaya — a reincarnation of Durga — who cursed Kansa before ascending","Devaki, after her apotheosis","Radha, as a form of Swarupa Shakti",1),
Q("With whom did Krishna and Balarama study, and in whose ashram?","With Sudama in the ashram of Sandipani, a Shiva devotee","With Sudama in the ashram of Vashishtha","With Arjuna in the ashram of Dronacharya","With Vidura in the ashram of Bharadvaja",0),
Q("Who was Subhadra, and whom did she marry? Who was their son?","Subhadra was Krishna's cousin, daughter of Ugrasena; she married Bhima; their son was Ghatotkacha","Subhadra was Krishna's half-sister — daughter of Vasudeva and Rohini — she married Arjuna; their son was Abhimanyu","Subhadra was Krishna's sister through Devaki; she married Nakula; their son was Shatanika","Subhadra was Balarama's daughter; she married Arjuna; their son was Abhimanyu",1),
]},
{n:"Shakuni, Gandhari, and the seeds of the great war",qs:[
Q("Where was the Gandhara Kingdom located?","Present-day Punjab","Present-day Rajasthan","Present-day Afghanistan","Present-day Balochistan",2),
Q("Why was Gandhari technically a widow before marrying Dhritarashtra?","She was first married to a goat to nullify the dosha of being a manglik","Her first husband died in battle before the wedding was consummated","She was cursed by a rishi to carry the mark of widowhood","She performed a symbolic marriage to a tree to remove a curse",0),
Q("Why did Bhishma imprison Shakuni's entire family?","Shakuni had insulted Bhishma at the wedding ceremony","Bhishma discovered Gandhari was technically a widow after being married to a goat, and felt the Kuru lineage was insulted","Saubala had declared war on Hastinapura","Shakuni had tried to assassinate Dhritarashtra",1),
Q("How were the enchanted dice created?","They were blessed by Shukracharya using a dark mantra","Saubala told Shakuni to fashion dice from his thigh bone after his death; the dice contained his soul and wrath","Shakuni carved them from the tusk of a divine elephant","They were forged from the iron of a fallen celestial weapon",1),
Q("What did the enchanted dice ultimately cause?","They bankrupted the Pandavas, humiliated Draupadi, and triggered the great war","They caused the death of Dhritarashtra","They destroyed the Gandhara Kingdom from within","They corrupted the Kuru treasury and led to famine",0),
]},
{n:"Karna — birth, identity, and allegiance",qs:[
Q("How did teenage Kunti come to possess the mantra to summon Devas?","Brahma granted it to her during a yagna","She learnt it from Vashishtha's scriptures","As a girl, Kunti served Durvasa so well that he granted her a mantra to summon any Deva","She received it from Narada during his visit to her father's court",2),
Q("Karna was born wearing what, and what did it make him?","A golden crown and divine sandals; it made him immune to curses","Golden armour (kavacha) and earrings (kundala) that were part of his skin, making him invincible","A sacred thread and a divine gem; it made him visible to the Devas","Silver armour and a helmet; it made him impervious to mortal weapons",1),
Q("Who found and raised Karna after Kunti set him afloat?","A Brahmana couple in Hastinapura","Adhiratha, Dhritarashtra's charioteer, and Adhiratha's wife Radha","Nanda and Yashoda in Gokula","A fisherman-chieftain on the banks of the Ganga",1),
Q("Why did Parashurama curse Karna?","Karna had stolen a divine weapon from Parashurama's ashram","Karna pretended to be a Brahmana; once, while Parashurama slept on Karna's lap, a scorpion bit Karna and he did not flinch; Parashurama realised he was a Kshatriya","Karna insulted Parashurama's lineage during a lesson","Karna failed a test of humility that all students had to pass",1),
Q("What did Indra give Karna in return for his kavacha and kundala?","The Brahmastra","The Gandiva","The Vasavi Shakti — a divya astra capable of killing Arjuna","The Narayanastra",2),
]},
{n:"Karna and Duryodhana's friendship",qs:[
Q("At the martial exhibition, why did Kripacharya halt Karna's duel with Arjuna?","Karna was using a forbidden weapon","A rajkumar could only fight a peer of equal lineage","The exhibition had a time limit that expired","Dronacharya ordered the halt to protect his student",1),
Q("What did Duryodhana do when Karna was mocked for his origins?","He gave Karna his personal chariot and weapons","He crowned Karna raja of Anga on the spot","He challenged the crowd to fight Karna themselves","He declared Karna a Kshatriya by royal decree",1),
Q("When Karna asked what he could give Duryodhana in return, what did Duryodhana ask for?","Half of Karna's kingdom","Karna's divine kavacha and kundala","Only lifelong friendship","Karna's allegiance in any future war",2),
]},
{n:"Karna's wives and sons",qs:[
Q("Who was Vrushali in relation to Duryodhana?","The daughter of Duryodhana's charioteer","The sister of Satyasena, Duryodhana's charioteer","Duryodhana's cousin from the Gandhara Kingdom","The daughter of Shakuni",1),
Q("Which of Karna's sons survived the Kurukshetra War and learnt archery under Arjuna?","Vrishasena","Vrishaketu","Satyasena","Sudama",1),
Q("Who was Bhanumati, and what was her connection to Karna's family?","Bhanumati was Duryodhana's wife, from the Kalinga Kingdom, present-day Odisha; she was a friend of Supriya, Karna's second wife","Bhanumati was Karna's mother-in-law","Bhanumati was Duryodhana's sister who married Karna","Bhanumati was Shakuni's wife and Gandhari's sister-in-law",0),
Q("Duryodhana and Bhanumati's son Lakshmana met what fate?","He survived the war and became the next king","He died in the Kurukshetra War","He was exiled after the war","He renounced the throne and became a sage",1),
]},
{n:"The feud between Drupada and Dronacharya",qs:[
Q("What did Drupada promise Dronacharya during their childhood friendship?","To make Dronacharya his chief minister","To share half his kingdom","To give Dronacharya his finest horse","To fund Dronacharya's ashram forever",1),
Q("What was Dronacharya's guru dakshina from his students?","A hundred cows from each student","The capture of Drupada","The conquest of Gandhara","The Pinaka Dhanusha from Janak's treasury",1),
Q("From the yagna Drupada performed for revenge, who emerged?","Shikhandi and Draupadi","Dhrishtadyumna — destined to kill Dronacharya — and Draupadi","Dhrishtadyumna and Shikhandi","Abhimanyu and Draupadi",1),
]},
{n:"Eklavya and Jarasandha",qs:[
Q("Eklavya was the son of Hiranyadhanus of which tribe?","The Vanaras — the monkey race","The Nishadas — a forest-dwelling tribe","The Nagas — the serpent race","The Gandharvas — the celestial musicians",1),
Q("Why did Jarasandha launch revenge attacks on Mathura after Krishna killed Kansa?","Kansa was Jarasandha's brother","Kansa had married Jarasandha's two daughters Asti and Prapti, making Jarasandha his father-in-law","Jarasandha had sworn an oath to protect Kansa","Kansa was Jarasandha's chief military commander",1),
Q("How was Jarasandha given life at birth?","Brahma breathed life into him","A Rakshasi named Jara joined his two lifeless halves","Shiva revived him with the Mrita Sanjivani Mantra","Vishwakarma assembled his body parts",1),
]},
{n:"Arjuna's curse and Brihannala",qs:[
Q("Why did Urvashi curse Arjuna to live as a eunuch?","Arjuna insulted her dancing","Arjuna said he saw her as a mother figure since she was a member of Indra's court; she was offended","Arjuna refused to accept her divine gift","Arjuna chose another Apsara over her",1),
]},
{n:"The game of dice and the humiliation of Draupadi",qs:[
Q("Who built the Maya Sabha, and what was it?","Vishwakarma built it; a celestial palace of gold","Mayasura built it; a hall of optical illusions","Tvashtar built it; a floating palace above Indraprastha","Shakuni built it; a palace designed to trap the Pandavas",1),
Q("What did Draupadi say to Duryodhana that became the primary reason he plotted the game of dice?","She called him the blind son of a blind man after he fell in the Maya Sabha","She insulted his wife Bhanumati's lineage","She refused to serve him food at the yagna","She laughed at his fighting skills in the arena",0),
Q("How did Krishna signal the solution for killing Jarasandha?","He drew a picture of Jarasandha being torn apart","He snapped a blade of grass and tossed the halves apart","He whispered the secret to Bhima's ear","He told Arjuna to use the Pashupatastra",1),
Q("What did Duryodhana do to Draupadi during the game of dice, and what vow did Bhima make in response?","Duryodhana threw his crown at Draupadi; Bhima vowed to crush Duryodhana's skull","Duryodhana ordered Draupadi imprisoned; Bhima vowed to destroy the Kaurava palace","Duryodhana patted his thigh, signalling Draupadi to sit on his lap; Bhima vowed to break those thighs with his mace","Duryodhana laughed at Draupadi's plight; Bhima vowed to kill all 100 Kaurava brothers",2),
Q("During Dushasana's attempt to disrobe Draupadi, what did Krishna do, and why?","Krishna appeared in court and threatened Dushasana with the Sudarshana Chakra","Krishna endlessly supplied cloth — repaying a debt, as she had once torn her sari to tend his wound","Krishna summoned Draupadi's brothers to rescue her from the court","Krishna cursed Dushasana to die by Bhima's hand in the Kurukshetra War",1),
Q("Who was the only Kaurava brother to condemn the disrobing of Draupadi, and what was his argument?","Yuyutsu; he argued Draupadi was a queen and must be respected","Vikarna; he argued Yudhishthira had no right to wager Draupadi since he had already lost himself","Dushasana; he later repented and argued against the act","Chitrasena; he argued the game itself was illegal",1),
]},
{n:"The Laksha Griha and Ghatotkacha",qs:[
Q("What was the Laksha Griha?","A house made of gold designed to impress the Pandavas","A house made of lac, a highly flammable resin — a plot to burn the Pandavas alive","A fortress made of iron where the Pandavas were imprisoned","A palace made of sandalwood that was set ablaze by lightning",1),
Q("Who saved the Pandavas from the Laksha Griha?","Krishna's intervention","Vidura's intervention","Bhishma's secret warning","Draupadi's quick thinking",1),
Q("Barbarik possessed the Teen Baan — three divine arrows. What could they do, and what did Krishna demand of Barbarik?","They could destroy any city; Krishna demanded the arrows themselves","They could finish any army in minutes; Krishna told Barbarik a Kshatriya must be sacrificed before the war; Barbarik offered his head","They could kill any single warrior; Krishna asked Barbarik to use them against Duryodhana","They could create an impenetrable shield; Krishna demanded them for Arjuna",1),
]},
{n:"The thirteen years of exile",qs:[
Q("The thirteenth year was spent in Viratanagar, capital of which kingdom?","The Chedi Kingdom, present-day Madhya Pradesh","The Panchala Kingdom, present-day Uttar Pradesh","The Matsya Kingdom, present-day Rajasthan","The Madra Kingdom, in the Punjab region",2),
Q("What role did Arjuna serve during the thirteenth year, and what curse was he fulfilling?","He served as a stable hand, fulfilling Durvasa's curse","He served as Brihannala, fulfilling Urvashi's one-year curse","He served as a cook, fulfilling Shiva's curse","He served as a musician, fulfilling Narada's curse",1),
Q("During the thirteenth year in Viratanagar, what roles did the other Pandavas and Draupadi serve — apart from Arjuna as Brihannala?","Draupadi served as Sairandhri, Sudeshna's maid; Yudhishthira served as Virat's minister; Bhima served as the royal cook; Nakula and Sahadeva worked in the stables","Draupadi served as a dancer; Yudhishthira served as Virat's priest; Bhima served as a bodyguard; Nakula and Sahadeva served as scribes","Draupadi served as Sudeshna's handmaiden; Yudhishthira served as Virat's general; Bhima served as a woodcutter; Nakula and Sahadeva served as merchants","Draupadi served as a cook; Yudhishthira served as Virat's advisor; Bhima served as a stable hand; Nakula and Sahadeva served as guards",0),
Q("Who attacked Viratanagar, and who defeated them?","The Kauravas attacked; Bhima defeated them","The Trigartas — allies of Duryodhana, led by their ruler, Susharma — attacked; Arjuna as Brihannala single-handedly defeated them and the entire Kuru army","The Magadha army attacked; Yudhishthira defeated them","The Nishadas attacked; Nakula and Sahadeva defeated them",1),
]},
{n:"The Yaksha Prashna",qs:[
Q("When the Yaksha offered to revive one brother, whom did Yudhishthira choose and why?","He chose Bhima, because Bhima was the strongest warrior needed for the upcoming war","He chose Arjuna, because Arjuna was the finest archer","He chose his stepbrother Nakula — since he as Kunti's son was alive, a son of Madri should also survive","He chose Sahadeva, because Sahadeva's knowledge of jyotish was indispensable",2),
Q("The Yaksha revealed himself as whom?","Indra, king of the Devas","Dharma, the cosmic principle","Yama, Yudhishthira's divine father","Vishnu, the preserver",2),
]},
{n:"The Madra Kingdom and Shalya",qs:[
Q("How did Duryodhana secure Shalya's support?","He defeated Shalya in a duel and claimed his allegiance","Duryodhana built lavish rest houses along Shalya's route, then revealed himself and claimed his support","He offered Shalya the throne of Hastinapura after the war","He held Shalya's son hostage",1),
]},
{n:"Before the Kurukshetra War",qs:[
Q("Krishna offered Duryodhana and Arjuna a choice. What were the two options, and who chose what?","His entire treasury or his counsel; Duryodhana chose the treasury, Arjuna chose counsel","His entire Narayani Sena or himself unarmed and non-combatant; Duryodhana chose the army, Arjuna chose Krishna","His divine weapons or his chariot; Duryodhana chose the weapons","His Sudarshana Chakra or his personal army; Arjuna chose the Chakra",1),
Q("Vyasa offered Dhritarashtra divya drishti to watch the battle. What happened?","Dhritarashtra accepted and watched the entire war","Dhritarashtra declined; Vyasa granted it to Sanjaya, Dhritarashtra's charioteer and advisor","Dhritarashtra declined; Gandhari watched instead","Dhritarashtra accepted but could only see the first ten days",1),
Q("Who was the only warrior to cross the battlefield and join the Pandavas from the Kaurava side?","Vikarna","Shalya","Yuyutsu — son of Dhritarashtra and a maid named Sughada","Kripacharya",2),
]},
{n:"Day 10 of the Kurukshetra War — the fall of Bhishma",qs:[
Q("Why did Bhishma lower his weapons and refuse to fight when he saw Shikhandi?","Shikhandi was his grandchild and he could not strike family","Bhishma had vowed never to strike a woman or anyone who had been a woman; he recognised Amba's soul","Shikhandi possessed a divine shield that repelled all of Bhishma's weapons","Krishna placed a spell on Bhishma that made him unable to fight",1),
Q("How did Bhishma fall?","He was struck by a single divine arrow from Shikhandi","Arjuna fired a relentless volley; Bhishma fell onto a bed of arrows","Krishna used the Sudarshana Chakra to wound him","Dhrishtadyumna struck him from behind while Shikhandi distracted him",1),
]},
{n:"Day 12 of the Kurukshetra War — Bhagadatta",qs:[
Q("Bhagadatta was the ruler of which kingdom?","The Sindhu Kingdom, present-day Sindh","The Pragjyotisha Kingdom, present-day Assam","The Kalinga Kingdom, present-day Odisha","The Gandhara Kingdom, present-day Afghanistan",1),
Q("When Bhagadatta launched the Vaishnavastra at Arjuna, what happened?","Arjuna deflected it with the Brahmastra","Krishna stepped in front; the weapon turned into a garland of flowers, returning to its source — Vishnu","Bhima intercepted the weapon and absorbed its energy","The weapon was neutralised by Arjuna's kavacha",1),
Q("How did Arjuna defeat Bhagadatta?","He pierced Bhagadatta's heart with a divine arrow","Arjuna pierced the silk bandage holding Bhagadatta's eyelids open, blinding him, and struck him down","He used the Pashupatastra to destroy Bhagadatta's elephant","He challenged Bhagadatta to single combat on foot",1),
]},
{n:"Day 13 of the Kurukshetra War — the Chakravyuha and the death of Abhimanyu",qs:[
Q("Why did Abhimanyu only know how to enter the Chakravyuha but not exit?","Dronacharya had deliberately withheld the exit strategy from him","Subhadra had dozed off while Arjuna explained the exit strategy during pregnancy","The exit strategy was known only to Krishna, who was away","Abhimanyu had refused to learn the exit, believing he would never need it",1),
Q("Who blocked the other four Pandavas from entering the Chakravyuha, and how?","Dronacharya used a divine barrier","Jayadratha used a boon from Shiva — the power to hold back four Pandavas, excluding Arjuna, for one day","Karna fired a wall of arrows blocking their path","Ashwatthama used the Narayanastra to create an impassable field",1),
Q("How was Abhimanyu ultimately killed?","He was struck by a single arrow from Karna while fighting bravely","Karna broke his dhanusha from behind; others killed his horses and charioteer; weaponless, he fought with a chariot wheel, then a mace; Dushasana's son struck him on the head","Dronacharya personally defeated him in single combat","He fell into a trap set by Shakuni within the formation",1),
]},
{n:"Day 14 of the Kurukshetra War — the killing of Jayadratha",qs:[
Q("What vow did Arjuna make regarding Jayadratha?","To capture Jayadratha alive and bring him before Yudhishthira","To kill Jayadratha by sunset or immolate himself","To kill Jayadratha within the first hour of battle","To defeat Jayadratha in single combat before the Kaurava army",1),
Q("Jayadratha's father Vridhakshatra had a boon regarding Jayadratha's head. What was it?","Whoever touched Jayadratha's head would be turned to stone","Whoever caused Jayadratha's head to fall to the ground would have their own head burst","Jayadratha's head could never be severed by a mortal weapon","Whoever saw Jayadratha's severed head would go blind",1),
Q("How did Krishna ensure Vridhakshatra's boon was turned against himself?","Krishna caught Jayadratha's head in mid-air and placed it on a funeral pyre","Arjuna used a divya astra to carry the severed head into the lap of Vridhakshatra, who was meditating nearby; Vridhakshatra dropped the head — triggering the curse on himself","Krishna used the Sudarshana Chakra to guide the head away from the ground","Bhima caught the head and threw it onto Vridhakshatra's lap",1),
]},
{n:"The fall of Dronacharya",qs:[
Q("How did Krishna drown out Yudhishthira's whisper 'the elephant'?","He ordered the war drums to be beaten loudly","Krishna blew his conch","He used a divine mantra to silence all sound except the first part","He instructed Bhima to roar simultaneously",1),
Q("Who beheaded Dronacharya after he dropped his weapons?","Arjuna","Bhima","Dhrishtadyumna — fulfilling the prophecy","Shikhandi",2),
]},
{n:"Karna's fall",qs:[
Q("Why did Krishna compel Karna to use the Vasavi Shakti on Ghatotkacha?","So that Karna would not save it for Arjuna","Because Ghatotkacha was the most dangerous warrior on the field that night","To test whether the Vasavi Shakti truly worked","Because Ghatotkacha was about to kill Duryodhana",0),
Q("What role did Shalya play as Karna's charioteer?","He secretly steered the chariot into traps","He constantly praised Arjuna and insulted Karna to weaken his resolve","He abandoned Karna mid-battle, leaving him without a chariot","He fed Karna false intelligence about the Pandava positions",1),
Q("Who was the final Kaurava general after Karna's death, and who killed him?","Ashwatthama; killed by Arjuna","Kripacharya; killed by Bhima","Shalya; killed by Yudhishthira","Shakuni; killed by Sahadeva",2),
]},
{n:"The final day of the Kurukshetra War — the fall of Duryodhana",qs:[
Q("Under whom did both Bhima and Duryodhana study gada yuddha?","Dronacharya","Parashurama","Balarama, Krishna's elder brother","Kripacharya",2),
Q("Why were Duryodhana's thighs his only vulnerable point?","Gandhari's blindfold slipped while gazing at his thighs, leaving them unprotected","Krishna had tricked him into covering his thighs with leaves when Gandhari asked him to come unclothed","Duryodhana had a wound from childhood that never healed on his thigh","Bhishma had cursed Duryodhana's thighs after being felled by arrows",1),
Q("Why did Balarama raise his hala to kill Bhima, and who intervened?","Because Bhima used a forbidden weapon; Krishna intervened","Because Bhima struck Duryodhana's thighs — a move forbidden in gada yuddha as all strikes must be above the waist; Krishna intervened","Because Bhima insulted Balarama during the fight; Yudhishthira intervened","Because Bhima attacked Duryodhana after he had surrendered; Vyasa intervened",1),
]},
{n:"After the Kurukshetra War — Ashwatthama's rage",qs:[
Q("What did Ashwatthama do in his nighttime attack on the Pandava camp?","He killed the five Pandavas in their sleep","He killed the Pandavas' five sons and Dhrishtadyumna","He destroyed the Pandava weaponry and supplies","He abducted Draupadi and held her hostage",1),
Q("The Brahmashirastra was how many times more powerful than the Brahmastra?","Two times","Ten times","Four times, carrying four heads of Brahma versus one","Seven times",2),
Q("What curse did Krishna place on Ashwatthama?","To live as a mortal with no memory of his divine knowledge","To roam the Earth in pain as a Chiranjeevi till the end of Kali Yuga","To be reborn as a Shudra in every subsequent life","To wander Patala for eternity",1),
]},
{n:"After the Kurukshetra War — Dhritarashtra's rage and Gandhari's curse",qs:[
Q("How did Krishna prevent Dhritarashtra from crushing Bhima in an embrace?","He warned Bhima to dodge at the last moment","Krishna pushed an iron statue into Dhritarashtra's arms instead; Dhritarashtra shattered it","He placed a divine shield around Bhima","He paralysed Dhritarashtra's arms with a mantra",1),
Q("What did Gandhari curse, and why?","She cursed the Pandavas to never enjoy their kingdom; she blamed them for the war","She cursed the Yadavas to perish in internal strife; she blamed Krishna, believing that as god he could have stopped the slaughter","She cursed Hastinapura to fall within a generation; she blamed Bhishma","She cursed Krishna to die alone; she blamed him for Duryodhana's death",1),
]},
{n:"The destruction of the Yadavas and the death of Krishna",qs:[

const STORAGE_KEY='SharadaPeethUnseenPool';
const pastelColors=[
{bg:"#F3E8FF",border:"#D8B4FE",accent:"#A855F7"},
{bg:"#DBEAFE",border:"#93C5FD",accent:"#3B82F6"},
{bg:"#D1FAE5",border:"#6EE7B7",accent:"#10B981"},
{bg:"#FEF3C7",border:"#FCD34D",accent:"#F59E0B"},
{bg:"#FCE7F3",border:"#F9A8D4",accent:"#EC4899"},
{bg:"#E0E7FF",border:"#A5B4FC",accent:"#6366F1"},
{bg:"#CCFBF1",border:"#5EEAD4",accent:"#14B8A6"},
{bg:"#FFF7ED",border:"#FDBA74",accent:"#F97316"},
];
const getColor=i=>pastelColors[i%pastelColors.length];
const optLabels=["A","B","C","D"];

function loadPool(){
  try{
    const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));
    return saved?.length>0?saved:ALL_TOPICS;
  }catch{return ALL_TOPICS}
}
function savePool(pool){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(pool));
}

function App(){
  const[screen,setScreen]=useState("home");
  const[topicIdx,setTopicIdx]=useState(0);
  const[qIdx,setQIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[selected,setSelected]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[results,setResults]=useState([]);
  const[unseenPool,setUnseenPool]=useState(()=>loadPool());
  const[sgContent,setSgContent]=useState(null);
  const[sgLoading,setSgLoading]=useState(false);
  const[sgError,setSgError]=useState(null);
  const sgFetched=useRef(false);

  useEffect(()=>{
    if(screen!=="studyguide"||sgFetched.current)return;
    sgFetched.current=true;
    setSgLoading(true);setSgError(null);
    fetch(STUDY_GUIDE_URL)
      .then(r=>{if(!r.ok)throw new Error("Failed to load");return r.text()})
      .then(t=>{setSgContent(t);setSgLoading(false)})
      .catch(e=>{setSgError(e.message);setSgLoading(false)});
  },[screen]);

  const topic=ALL_TOPICS[topicIdx];
  const question=topic?.qs[qIdx];
  const totalQ=topic?.qs.length||0;

  const unseenNames=new Set(unseenPool.map(t=>t.n));
  const isSeen=i=>!unseenNames.has(ALL_TOPICS[i].n);

  const startTopic=useCallback(i=>{
    setTopicIdx(i);setQIdx(0);setScore(0);setSelected(null);setAnswered(false);setResults([]);setScreen("quiz");
  },[]);

  const markTopicDone=useCallback((idx)=>{
    setUnseenPool(prev=>{
      const topicName=ALL_TOPICS[idx].n;
      let next=prev.filter(t=>t.n!==topicName);
      if(next.length===0)next=[...ALL_TOPICS];
      savePool(next);
      return next;
    });
  },[]);

  const handleSelect=useCallback(i=>{
    if(answered)return;
    setSelected(i);setAnswered(true);
    const correct=i===question.a;
    setScore(s=>s+(correct?3:-1));
    setResults(r=>[...r,{correct,selected:i,answer:question.a}]);
  },[answered,question]);

  const nextQ=useCallback(()=>{
    if(qIdx+1>=totalQ){markTopicDone(topicIdx);setScreen("results")}
    else{setQIdx(q=>q+1);setSelected(null);setAnswered(false)}
  },[qIdx,totalQ,topicIdx,markTopicDone]);

  const endQuiz=useCallback(()=>{markTopicDone(topicIdx);setScreen("results")},[topicIdx,markTopicDone]);
  const goHome=useCallback(()=>setScreen("home"),[]);
  const retry=useCallback(()=>startTopic(topicIdx),[startTopic,topicIdx]);

  const resetMemory=useCallback(()=>{
    localStorage.removeItem(STORAGE_KEY);
    setUnseenPool([...ALL_TOPICS]);
  },[]);

  const maxScore=totalQ*3;
  const correctCount=results.filter(r=>r.correct).length;
  const wrongCount=results.filter(r=>!r.correct).length;
  const accuracy=results.length>0?Math.round((correctCount/results.length)*100):0;
  const completedCount=ALL_TOPICS.length-unseenPool.length;

  if(screen==="home"){
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FAF5FF 0%,#EFF6FF 50%,#ECFDF5 100%)",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"32px 16px"}}>
          <div style={{textAlign:"center",marginBottom:40}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:12,marginBottom:8}}>
              <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#A855F7,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,fontWeight:700}}>श</div>
              <h1 style={{fontSize:"clamp(24px,5vw,32px)",fontWeight:700,color:"#1E1B4B",margin:0,letterSpacing:"-0.5px"}}>Sharada Peeth</h1>
              <button onClick={resetMemory} title="Reset all progress" style={{
                width:32,height:32,borderRadius:8,border:"1.5px solid #D1D5DB",background:"#fff",
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:16,color:"#6B7280",transition:"all 0.2s",flexShrink:0
              }}
              onMouseEnter={e=>{e.currentTarget.style.background="#F3F4F6";e.currentTarget.style.borderColor="#9CA3AF";e.currentTarget.style.color="#374151"}}
              onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#D1D5DB";e.currentTarget.style.color="#6B7280"}}
              >↻</button>
            </div>
            <p style={{color:"#6B7280",fontSize:15,margin:0,letterSpacing:"0.5px"}}>Interactive Sanatani learning quiz</p>
            <div style={{marginTop:16,display:"inline-block",background:"#fff",borderRadius:20,padding:"6px 18px",fontSize:13,color:"#6366F1",fontWeight:600,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
              {ALL_TOPICS.length} topics · {ALL_TOPICS.reduce((s,t)=>s+t.qs.length,0)} questions
              {completedCount>0&&<span style={{color:"#059669"}}> · {completedCount} done</span>}
            </div>
            <div style={{marginTop:10}}>
              <button onClick={()=>setScreen("studyguide")} style={{fontSize:13,fontWeight:700,color:"#6366F1",letterSpacing:"1.5px",background:"none",border:"none",borderBottom:"1.5px solid #A5B4FC",paddingBottom:1,cursor:"pointer"}}>STUDY GUIDE</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(280px,100%),1fr))",gap:14}}>
            {ALL_TOPICS.map((t,i)=>{
              const c=getColor(i);
              const done=isSeen(i);
              return(
                <button key={i} onClick={()=>startTopic(i)} style={{
                  textAlign:"left",padding:"18px 20px",borderRadius:14,border:`1.5px solid ${done?"#E5E7EB":c.border}`,
                  background:done?"#F9FAFB":"#fff",cursor:"pointer",transition:"all 0.2s",
                  boxShadow:"0 1px 4px rgba(0,0,0,0.04)",opacity:done?0.55:1,position:"relative",
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=done?"#F3F4F6":c.bg;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.08)";e.currentTarget.style.opacity="1"}}
                onMouseLeave={e=>{e.currentTarget.style.background=done?"#F9FAFB":"#fff";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.04)";e.currentTarget.style.opacity=done?"0.55":"1"}}
                >
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:20}}>
                    <span style={{fontSize:14,fontWeight:600,color:done?"#9CA3AF":"#1F2937",lineHeight:1.4}}>{t.n}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      {done&&<span style={{fontSize:14}}>✓</span>}
                      <span style={{background:done?"#F3F4F6":c.bg,color:done?"#9CA3AF":c.accent,fontSize:12,fontWeight:700,borderRadius:8,padding:"3px 9px",border:`1px solid ${done?"#E5E7EB":c.border}`}}>
                        {t.qs.length}
                      </span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  if(screen==="quiz"){
    const c=getColor(topicIdx);
    const progress=(qIdx/totalQ)*100;
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FAF5FF 0%,#EFF6FF 50%,#ECFDF5 100%)",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif"}}>
        <div style={{maxWidth:720,margin:"0 auto",padding:"28px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <button onClick={goHome} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:14,padding:"6px 0",display:"flex",alignItems:"center",gap:6}}>← Topics</button>
            <button onClick={endQuiz} style={{background:"#FEE2E2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:10,padding:"7px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>End quiz</button>
          </div>
          <div style={{background:"#fff",borderRadius:18,padding:"clamp(18px,4vw,28px)",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:`1.5px solid ${c.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8}}>
              <span style={{fontSize:13,color:c.accent,fontWeight:700,background:c.bg,padding:"4px 12px",borderRadius:8,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topic.n}</span>
              <div style={{display:"flex",gap:12,alignItems:"center",flexShrink:0}}>
                <span style={{fontSize:13,color:"#6B7280",fontWeight:500}}>{qIdx+1} / {totalQ}</span>
                <span style={{fontSize:13,fontWeight:700,color:score>=0?"#059669":"#DC2626",background:score>=0?"#D1FAE5":"#FEE2E2",padding:"4px 10px",borderRadius:8}}>{score>=0?"+":""}{score}</span>
              </div>
            </div>
            <div style={{height:4,background:"#F3F4F6",borderRadius:4,marginBottom:24,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${c.accent},${c.border})`,borderRadius:4,transition:"width 0.4s ease"}}/>
            </div>
            <p style={{fontSize:"clamp(14px,3.5vw,16px)",fontWeight:600,color:"#1F2937",lineHeight:1.55,margin:"0 0 24px 0"}}>{question.q}</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {question.o.map((opt,i)=>{
                const isSelected=selected===i;const isCorrect=i===question.a;
                let bg="#FAFAFA",border="#E5E7EB",color="#374151",labelBg="#F3F4F6",labelColor="#6B7280";
                if(answered){
                  if(isCorrect){bg="#D1FAE5";border="#6EE7B7";color="#065F46";labelBg="#059669";labelColor="#fff"}
                  else if(isSelected&&!isCorrect){bg="#FEE2E2";border="#FCA5A5";color="#991B1B";labelBg="#DC2626";labelColor="#fff"}
                  else{bg="#F9FAFB";border="#E5E7EB";color="#9CA3AF"}
                }
                return(
                  <button key={i} onClick={()=>handleSelect(i)} disabled={answered} style={{
                    display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:12,
                    border:`1.5px solid ${border}`,background:bg,cursor:answered?"default":"pointer",
                    textAlign:"left",transition:"all 0.2s",color
                  }}
                  onMouseEnter={e=>{if(!answered){e.currentTarget.style.background=c.bg;e.currentTarget.style.borderColor=c.border}}}
                  onMouseLeave={e=>{if(!answered){e.currentTarget.style.background="#FAFAFA";e.currentTarget.style.borderColor="#E5E7EB"}}}
                  >
                    <span style={{flexShrink:0,width:28,height:28,borderRadius:8,background:labelBg,color:labelColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>
                      {answered&&isCorrect?"✓":answered&&isSelected&&!isCorrect?"✗":optLabels[i]}
                    </span>
                    <span style={{fontSize:"clamp(13px,3vw,14px)",lineHeight:1.5}}>{opt}</span>
                  </button>
                );
              })}
            </div>
            {answered&&(
              <div style={{marginTop:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
                <span style={{fontSize:14,fontWeight:600,color:selected===question.a?"#059669":"#DC2626"}}>{selected===question.a?"✓ Correct":"✗ Wrong"}</span>
                <button onClick={nextQ} style={{
                  background:`linear-gradient(135deg,${c.accent},${c.border})`,color:"#fff",
                  border:"none",borderRadius:10,padding:"10px 24px",cursor:"pointer",
                  fontSize:14,fontWeight:600,boxShadow:"0 2px 8px rgba(0,0,0,0.1)"
                }}>{qIdx+1>=totalQ?"See results":"Next →"}</button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  if(screen==="results"){
    const c=getColor(topicIdx);
    const pct=maxScore>0?Math.round((Math.max(0,score)/maxScore)*100):0;
    let emoji="🏆",msg="Perfect score";
    if(pct<100&&pct>=70){emoji="🌟";msg="Excellent work"}
    else if(pct<70&&pct>=40){emoji="📖";msg="Good effort — review and retry"}
    else if(pct<40){emoji="🔄";msg="Keep learning — try again"}
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FAF5FF 0%,#EFF6FF 50%,#ECFDF5 100%)",fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"40px 16px"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"clamp(24px,5vw,36px) clamp(20px,4vw,32px)",boxShadow:"0 4px 20px rgba(0,0,0,0.07)",border:`1.5px solid ${c.border}`,textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:8}}>{emoji}</div>
            <h2 style={{fontSize:"clamp(18px,4vw,22px)",fontWeight:700,color:"#1F2937",margin:"0 0 4px 0"}}>{msg}</h2>
            <p style={{fontSize:13,color:c.accent,fontWeight:600,margin:"0 0 28px 0",background:c.bg,display:"inline-block",padding:"4px 14px",borderRadius:8}}>{topic.n}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:28}}>
              <div style={{background:"#F0FDF4",borderRadius:14,padding:"16px 8px"}}>
                <div style={{fontSize:28,fontWeight:700,color:"#059669"}}>{correctCount}</div>
                <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>Correct</div>
              </div>
              <div style={{background:"#FEF2F2",borderRadius:14,padding:"16px 8px"}}>
                <div style={{fontSize:28,fontWeight:700,color:"#DC2626"}}>{wrongCount}</div>
                <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>Wrong</div>
              </div>
              <div style={{background:c.bg,borderRadius:14,padding:"16px 8px"}}>
                <div style={{fontSize:28,fontWeight:700,color:c.accent}}>{totalQ-results.length}</div>
                <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>Skipped</div>
              </div>
            </div>
            <div style={{background:"#F9FAFB",borderRadius:14,padding:"20px",marginBottom:28}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:14,color:"#6B7280"}}>Total score</span>
                <span style={{fontSize:18,fontWeight:700,color:score>=0?"#059669":"#DC2626"}}>{score} / {maxScore}</span>
              </div>
              <div style={{height:8,background:"#E5E7EB",borderRadius:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${c.accent},${c.border})`,borderRadius:6,transition:"width 0.6s ease"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                <span style={{fontSize:12,color:"#9CA3AF"}}>Accuracy: {accuracy}%</span>
                <span style={{fontSize:12,color:"#9CA3AF"}}>{pct}%</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={retry} style={{flex:1,padding:"12px",borderRadius:12,border:`1.5px solid ${c.border}`,background:c.bg,color:c.accent,fontSize:14,fontWeight:600,cursor:"pointer"}}>↻ Retry topic</button>
              <button onClick={goHome} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${c.accent},${c.border})`,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>All topics</button>
            </div>
          </div>
        </div>
      </div>
    );
  }
  if(screen==="studyguide"){
    return(
      <div style={{minHeight:"100vh",background:"#fff",fontFamily:"Georgia,'Times New Roman',serif"}}>
        <div style={{position:"sticky",top:0,background:"#fff",borderBottom:"1px solid #E5E7EB",padding:"12px 24px",display:"flex",alignItems:"center",gap:16,zIndex:10}}>
          <button onClick={goHome} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:14}}>← Back</button>
          <span style={{fontWeight:700,fontSize:15,color:"#1F2937"}}>Study Guide</span>
        </div>
        <div style={{maxWidth:800,margin:"0 auto",padding:"32px 24px 64px",fontSize:16,lineHeight:1.8,color:"#1a1a1a",textAlign:"justify"}}>
          {sgLoading&&<p style={{color:"#6B7280",textAlign:"center",marginTop:60}}>Loading...</p>}
          {sgError&&<p style={{color:"#DC2626",textAlign:"center",marginTop:60}}>Error: {sgError}<br/><small>Check that STUDY_GUIDE_URL is set to a valid public raw file URL.</small></p>}
          {sgContent&&<div className="sg" dangerouslySetInnerHTML={{__html:marked.parse(sgContent)}}/>}
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
